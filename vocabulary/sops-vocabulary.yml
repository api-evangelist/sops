name: SOPS Vocabulary
description: >-
  Domain vocabulary for SOPS (Secrets OPerationS), covering secrets management,
  encryption concepts, key management services, and configuration patterns.
version: "1.0"
created: "2026-05-02"
modified: "2026-05-02"
terms:
  - term: SOPS
    definition: >-
      Secrets OPerationS. A CNCF Sandbox tool for encrypting configuration files
      while leaving keys unencrypted. Supports YAML, JSON, ENV, INI, and binary
      formats with multiple key management backends.
    tags:
      - Core Concept

  - term: Encrypted File
    definition: >-
      A configuration file processed by SOPS where sensitive values are replaced
      with AES256-GCM ciphertext while preserving the original file structure and
      unencrypted key names.
    tags:
      - Core Concept

  - term: Data Key
    definition: >-
      A symmetric encryption key generated by SOPS for each file encryption operation.
      The data key itself is encrypted by each configured KMS key and stored in the
      sops metadata block.
    tags:
      - Encryption

  - term: Key Management Service
    definition: >-
      An external service used to protect the SOPS data key. Supported KMS providers
      include AWS KMS, GCP KMS, Azure Key Vault, HuaweiCloud KMS, age, and PGP.
    aliases:
      - KMS
    tags:
      - Key Management

  - term: AWS KMS
    definition: >-
      Amazon Web Services Key Management Service. A cloud-based key management
      provider supported by SOPS. Keys are referenced by ARN and support role
      assumption for cross-account access.
    tags:
      - Key Management
      - AWS

  - term: GCP KMS
    definition: >-
      Google Cloud Platform Key Management Service. A cloud-based key management
      provider supported by SOPS. Keys are referenced by resource ID and use
      Application Default Credentials.
    tags:
      - Key Management
      - GCP

  - term: Azure Key Vault
    definition: >-
      Microsoft Azure's cloud key management service supported by SOPS. Keys are
      referenced by vault URL, key name, and version.
    tags:
      - Key Management
      - Azure

  - term: age
    definition: >-
      A simple, modern encryption tool and format. SOPS supports age as an
      alternative to PGP for offline/personal key management without the complexity
      of a KMS service.
    tags:
      - Encryption

  - term: PGP
    definition: >-
      Pretty Good Privacy. A widely-used asymmetric encryption standard supported
      by SOPS. Used with GPG for key management in offline or distributed team scenarios.
    tags:
      - Encryption

  - term: MAC
    definition: >-
      Message Authentication Code. A cryptographic value stored in the SOPS metadata
      that verifies the integrity of all encrypted values in the file.
    tags:
      - Security

  - term: Creation Rule
    definition: >-
      A configuration entry in .sops.yaml that specifies which encryption keys to use
      when creating new encrypted files matching a given path pattern.
    tags:
      - Configuration

  - term: Key Group
    definition: >-
      A named collection of encryption keys in SOPS used with Shamir Secret Sharing.
      Requires a minimum threshold of key groups to be present for decryption.
    tags:
      - Key Management

  - term: Shamir Secret Sharing
    definition: >-
      A cryptographic scheme used by SOPS key groups to split the data key among
      multiple key groups, requiring a threshold number to reconstruct it. Enables
      multi-factor access control for secrets.
    tags:
      - Key Management
      - Security

  - term: encrypted_regex
    definition: >-
      A .sops.yaml configuration option specifying which YAML/JSON keys should have
      their values encrypted. Keys not matching the regex are left unencrypted.
    tags:
      - Configuration

  - term: CNCF Sandbox
    definition: >-
      SOPS is hosted by the Cloud Native Computing Foundation as a Sandbox project,
      indicating early-stage but promising open source projects following cloud-native principles.
    tags:
      - Governance
